name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # let every OS report, even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pytest

      # Tier 1 — the pure-logic core (parsing, session/all-time scans, snapshot,
      # verdict) must behave identically on every OS. Tests import only stdlib +
      # the module, so no GUI deps are needed.
      - name: Unit tests (logic core)
        run: pytest -q

      # Tier 2 — the module must import and the GUI-free CLI paths must run on this
      # OS. Catches import-time regressions and platform-specific breakage in the
      # headless code path. (GUI/tray/widget are Windows-only and tested separately.)
      - name: Import smoke
        run: python -c "import claude_usage_tracker as m; print('loaded', m.__version__)"

      - name: CLI smoke (--version)
        run: python claude_usage_tracker.py --version

      - name: Headless run smoke (--once)
        shell: bash        # uniform across runners (Git Bash on Windows)
        run: |
          # No credentials in CI, so run_once exits non-zero with a graceful
          # "ERROR:" line. We assert it ran cleanly (no traceback / crash).
          out=$(python claude_usage_tracker.py --once 2>&1) || true
          echo "$out"
          if echo "$out" | grep -q 'Traceback'; then
            echo "::error::run_once raised an unhandled exception"; exit 1
          fi
          echo "$out" | grep -qE 'STATUS:|ERROR:' \
            || { echo "::error::run_once produced no recognizable output"; exit 1; }
